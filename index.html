<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>aimghost</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <span>hits: <b id="hud-hits">0</b></span>
    <span>misses: <b id="hud-misses">0</b></span>
    <span>acc: <b id="hud-acc">–</b></span>
    <span>last rt: <b id="hud-rt">–</b></span>
  </div>
  <div id="controls">
    <button id="end-session">End Session</button>
    <button id="load-replay">Load Replay</button>
    <button id="bot-toggle">Bot: off</button>
    <button id="back-to-game" hidden>Back to Game</button>
  </div>
  <input type="file" id="replay-file" accept=".json,application/json" hidden>
  <script src="recorder.js"></script>
  <script src="bot.js"></script>
  <script src="game.js"></script>
  <script src="replay.js"></script>
</body>
</html>
