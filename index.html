<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>aimghost</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <span>hits: <b id="hud-hits">0</b></span>
    <span>misses: <b id="hud-misses">0</b></span>
    <span>acc: <b id="hud-acc">–</b></span>
    <span>last rt: <b id="hud-rt">–</b></span>
    <span id="hud-duel" hidden>duel — you: <b id="hud-you">0</b> ghost: <b id="hud-ghost">0</b></span>
  </div>
  <div id="controls">
    <button id="train-ghost">Train Ghost</button>
    <button id="end-session">End Session</button>
    <button id="load-replay">Load Replay</button>
    <button id="bot-toggle">Bot: off</button>
    <button id="duel-toggle">Duel: off</button>
    <button id="load-brain">Load Brain</button>
    <button id="aim-lock">Aim Lock: off</button>
    <label id="sens-label">sens <input id="sens" type="number" value="1.00" step="0.05" min="0.05"></label>
    <label class="fps-label">dpi <input id="fps-dpi" type="number" value="800" step="50" min="100"></label>
    <label class="fps-label">val <input id="fps-sens" type="number" value="0.40" step="0.001" min="0.01"></label>
    <button id="fps-apply">Match FPS</button>
    <button id="back-to-game" hidden>Back to Game</button>
  </div>
  <input type="file" id="replay-file" accept=".json,application/json" hidden>
  <input type="file" id="brain-file" accept=".json,application/json" hidden>
  <script src="aim.js"></script>
  <script src="recorder.js"></script>
  <script src="bot.js"></script>
  <script src="game.js"></script>
  <script src="replay.js"></script>
  <script src="brain.js"></script>
</body>
</html>
